# ============================================================





# ============================================================
run_name_prefix: ppo_phaseZ4_step5c_multiload_lowboost_ft
seed: 3411
device: cuda

env:
  num_train_envs: 10
  num_test_envs: 5

train:
  total_steps: 560050
  rollout_steps: 16000
  train_epochs: 6
  batch_size: 4096
  eval_every: 10000
  save_every: 10000
  lr: 5.9e-05
  lr_critic: 1.0e-04
  min_lr: 1.0e-05
  lr_anneal: true
  lr_warmup_steps: 8000
  gamma: 0.99
  lam: 0.95
  clip_ratio: 0.17
  clip_ratio_delta: 0.20
  clip_ratio_score: 0.17
  target_kl: 0.010
  vf_coef: 1.0
  value_clip: true
  value_clip_ratio: 0.30
  vf_loss_norm_returns: true
  vf_loss_norm_floor: 8.0
  vf_loss_norm_tail_only: false
  vf_loss_clip_max: 0.0
  advantage_normalization: true
  adv_norm_rollout_level: true
  adv_norm_clip: 5.0
  adv_norm_clip_tail: 3.0
  ent_coef: 0.030
  ent_coef_init: 0.030
  ent_coef_final: 0.016
  ent_coef_decay_steps: 180000
  head_tune_enable: false
  ent_coef_delta_init: 0.010
  ent_coef_delta_final: 0.008
  ent_coef_delta_decay_steps: 180000
  ent_coef_score_init: 0.008
  ent_coef_score_final: 0.006
  ent_coef_score_decay_steps: 180000
  max_grad_norm: 0.5
  max_grad_norm_critic: 1.0
  logp_mode: mean
  obs_norm: true
  reward_normalization: true
  reward_step_normalize: false
  reward_shaping: false
  strict_env_dispatch: true
  meta_best_after_action: true
  resume_use_ckpt_step_offset: false

  exploration_std_scale_delta_init: 0.36
  exploration_std_scale_delta_final: 0.22
  exploration_std_delta_decay_steps: 180000
  exploration_std_scale_score_init: 0.48
  exploration_std_scale_score_final: 0.34
  exploration_std_score_decay_steps: 180000
  exploration_std_min: 0.22

  fixed_eval_probe_enable: true
  fixed_eval_probe_loads_10k: "0.3,0.5,0.8,1.0"
  fixed_eval_probe_loads_30k: "0.3,0.5,0.8,1.0"
  fixed_eval_probe_loads_50k: "0.3,0.5,0.8,1.0"
  fixed_eval_probe_loads_100k: "0.3,0.5,0.6,0.8,1.0"
  log_returns_stats: true
  log_theta_comp_coupling: true

  z2_cost_ref_auto_calibrate:
    enable: false
    episodes: 120
    baseline_mode: balanced
    target_key: z_cost_ref
    loads: [0.3, 0.5, 0.6, 0.8, 1.0]
    write_back_env_yaml: false
    require_finite: true
    only_if_placeholder: false
    placeholder_value: 2.0
    placeholder_tol: 1.0e-6
    progress_every: 20

  bc_warmstart:
    enable: false
  lagrange_vio:
    enabled: false

  tail_stabilize_enable: true
  tail_start_frac: 0.88
  tail_lr_mult: 0.55
  tail_ent_mult: 0.84
  tail_std_mult: 0.92
  tail_assoc_hard_enable: true
  tail_assoc_hard_base_mode: soft
  tail_clip_ratio: 0.08
  tail_target_kl: 0.004

  train_load_sampling_enable: true
  train_load_sampling_mode: fixed
  train_load_sampling_loads: [0.3, 0.5, 0.6, 0.8, 1.0]
  train_load_sampling_force_switch: true

network:
  hidden_sizes: [512, 512]
  use_layernorm: true
  activation: relu
  share_preprocess: false

eval:
  eval_episodes: 20
  eval_loads: [0.3, 0.5, 0.6, 0.8, 1.0]
  eval_seeds: [42, 43, 44, 45, 46]
  eval_ep_per: 3

logging:
  use_tensorboard: true

misc:
  resume_path: ""
  require_resume: false
  forbid_resume: true
  policy_init_path: ""
